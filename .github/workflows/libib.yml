name: Libib CSV Fetch

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  fetch:
    runs-on: ubuntu-22.04

    # Run inside your custom Docker image with real Chrome installed
    container:
      image: ghcr.io/ayekenlibrary/playwright-chrome:latest

    env:
      NODE_OPTIONS: --max-old-space-size=4096

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          
      - name: Install deps
        run: npm ci --prefer-offline

      # No Playwright browser install needed — Chrome is already in the container

      - name: Create persistent profile directory
        run: mkdir -p .github/pw-profile/

      - name: Run Libib fetch
        env:
          LIBIB_EMAIL: ${{ secrets.LIBIB_EMAIL }}
          LIBIB_PASSWORD: ${{ secrets.LIBIB_PASSWORD }}
          LIBIB_EXPORT_URL: ${{ secrets.LIBIB_EXPORT_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_OBJECT_KEY: libib-lending.csv
        run: npm run fetch-libib
        
      - name: Notify Cloudflare Worker
        run: |
          curl --max-time 10 \
            -H "Authorization: Bearer ${{ secrets.CF_CALLBACK_SECRET }}" \
            "https://ayekenlibrary.com/github-callback?status=${{ job.status }}"
