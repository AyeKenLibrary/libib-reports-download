name: Build & Publish Docker Image

on:
  push:
    branches: [ "main" ]
    paths:
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - "**/*.js"
      - ".github/workflows/build-docker.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/playwright-chrome

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/playwright-chrome:latest
            ghcr.io/${{ github.repository_owner }}/playwright-chrome:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
