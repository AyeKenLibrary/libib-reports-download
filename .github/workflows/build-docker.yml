name: Build & Publish Docker Image

on:
  push:
    branches: [ "main" ]
    paths:
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - "**/*.js"
      - ".github/workflows/build-docker.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        id: owner
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      # 🔧 Enable Buildx (required for caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.owner_lc }}/playwright-chrome

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true

          # 🔥 Docker layer caching (now supported because Buildx is enabled)
          cache-from: type=gha
          cache-to: type=gha,mode=max

          tags: |
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/playwright-chrome:latest
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/playwright-chrome:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

